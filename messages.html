<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="给晓染发送私信。" />
    <title>晓染 - 私信</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#home" data-page="home.html"><span>晓染</span></a>
      <nav aria-label="主导航">
        <a href="#home" data-page="home.html">首页</a>
        <a href="#school" data-page="school.html">学校</a>
        <a href="#messages" data-page="messages.html">私信</a>
        <a href="#skills" data-page="skills.html">技能</a>
        <a href="#awards" data-page="awards.html">奖状</a>
        <a href="#logout" data-auth-action="logout">登出</a>
      </nav>
    </header>

    <main id="top">
      <section id="messages" class="section">
        <div class="section-heading glass-panel reveal-card">
          <div>
            <p class="micro">Private Message</p>
            <h1>私信留言</h1>
          </div>
        </div>

        <div class="message-layout">
          <form id="messageForm" class="glass-panel message-form reveal-card delay-1">
            <p id="messageGate" class="gate">未登录</p>
            <label>
              名字
              <input name="name" placeholder="你的名字" maxlength="32" disabled />
            </label>
            <label>
              内容
              <textarea name="message" rows="5" placeholder="写下想说的话" data-required-when-active maxlength="500" disabled></textarea>
            </label>
            <button class="button primary" type="submit" disabled>发送</button>
          </form>

          <div class="glass-panel reveal-card delay-2">
            <h2>最新留言</h2>
            <div id="messageList" class="message-list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> 晓染</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
