<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="晓染的技能作品展示。" />
    <title>晓染 - 技能</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#home" data-page="home.html"><span>晓染</span></a>
      <nav aria-label="主导航">
        <a href="#home" data-page="home.html">首页</a>
        <a href="#school" data-page="school.html">学校</a>
        <a href="#messages" data-page="messages.html">私信</a>
        <a href="#skills" data-page="skills.html">技能</a>
        <a href="#awards" data-page="awards.html">奖状</a>
        <a href="#logout" data-auth-action="logout">登出</a>
      </nav>
    </header>

    <main id="top">
      <section id="skills" class="section">
        <div class="section-heading glass-panel reveal-card">
          <div>
            <p class="micro">Skill Matrix</p>
            <h1>技能作品</h1>
          </div>
        </div>

        <div class="card-grid skills-grid">
          <article class="showcase-card skill-card glass-panel reveal-card">
            <img src="assets/skill-display/skill-1-full.jpg" alt="圣诞主题海报作品" width="904" height="1200" loading="eager" decoding="async" />
            <div>
              <span class="tag">海报制作</span>
              <h2>节日主题视觉</h2>
            </div>
          </article>
          <article class="showcase-card skill-card skill-card-crop glass-panel reveal-card delay-1">
            <img src="assets/skill-display/skill-2-cropped.jpg" alt="智慧抗衰主题演示页面" width="720" height="1056" loading="lazy" decoding="async" />
            <div>
              <span class="tag">信息排版</span>
              <h2>商业页面表达</h2>
            </div>
          </article>
          <article class="showcase-card skill-card glass-panel reveal-card delay-2">
            <img src="assets/skill-display/skill-3-cropped.jpg" alt="美容项目宣传海报" width="760" height="1075" loading="lazy" decoding="async" />
            <div>
              <span class="tag">宣传物料</span>
              <h2>项目视觉整合</h2>
            </div>
          </article>
          <article class="showcase-card skill-card glass-panel reveal-card delay-3">
            <img src="assets/skill-display/skill-4-full.jpg" alt="空间平面图纸" width="980" height="749" loading="lazy" decoding="async" />
            <div>
              <span class="tag">图纸整理</span>
              <h2>空间布局表达</h2>
            </div>
          </article>
          <article class="showcase-card skill-card skill-card-wide glass-panel reveal-card delay-1">
            <img src="assets/skill-display/skill-6-cropped.jpg" alt="游戏个人主页截图" width="1100" height="546" loading="lazy" decoding="async" />
            <div>
              <span class="tag">游戏主页</span>
              <h2>个人战绩界面</h2>
            </div>
          </article>
          <article class="showcase-card skill-card glass-panel reveal-card">
            <img src="assets/skill-display/skill-5-cropped.jpg" alt="中国国际大学生创新大赛项目海报" width="900" height="1289" loading="lazy" decoding="async" />
            <div>
              <span class="tag">创新项目</span>
              <h2>农田变量施药方案</h2>
            </div>
          </article>
          <article class="placeholder-card glass-panel reveal-card delay-1">
            <span>+</span>
            <strong>新增作品位</strong>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> 晓染</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
