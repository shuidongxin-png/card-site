<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="晓染的奖状与证书展示。" />
    <title>晓染 - 奖状</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#home" data-page="home.html"><span>晓染</span></a>
      <nav aria-label="主导航">
        <a href="#home" data-page="home.html">首页</a>
        <a href="#school" data-page="school.html">学校</a>
        <a href="#messages" data-page="messages.html">私信</a>
        <a href="#skills" data-page="skills.html">技能</a>
        <a href="#awards" data-page="awards.html">奖状</a>
        <a href="#entry" data-page="index.html">入口</a>
      </nav>
    </header>

    <main id="top">
      <section id="awards" class="section">
        <div class="section-heading glass-panel reveal-card">
          <div>
            <p class="micro">Awards Archive</p>
            <h1>奖状证书</h1>
          </div>
        </div>

        <div class="card-grid award-grid">
          <article class="showcase-card award-card glass-panel reveal-card">
            <div class="award-media">
              <img src="assets/card-thumbs/award-1.jpg" alt="英语四级成绩截图" width="620" height="760" loading="eager" decoding="async" />
            </div>
            <h2>英语四级成绩</h2>
          </article>
          <article class="showcase-card award-card glass-panel reveal-card delay-1">
            <div class="award-media">
              <img src="assets/card-thumbs/award-2.jpg" alt="优秀个人荣誉证书" width="760" height="623" loading="eager" decoding="async" />
            </div>
            <h2>优秀个人</h2>
          </article>
          <article class="showcase-card award-card glass-panel reveal-card delay-2">
            <div class="award-media">
              <img src="assets/card-thumbs/award-3.jpg" alt="中国国际大学生创新大赛证书" width="760" height="623" loading="eager" decoding="async" />
            </div>
            <h2>创新大赛银奖</h2>
          </article>
          <article class="showcase-card award-card glass-panel reveal-card delay-3">
            <div class="award-media">
              <img src="assets/card-thumbs/award-4.jpg" alt="蓝桥杯获奖证书" width="640" height="780" loading="eager" decoding="async" />
            </div>
            <h2>蓝桥杯三等奖</h2>
          </article>
          <article class="showcase-card award-card glass-panel reveal-card">
            <div class="award-media">
              <img src="assets/card-thumbs/award-5.jpg" alt="春日光影故事征文优秀作品奖证书" width="760" height="623" loading="eager" decoding="async" />
            </div>
            <h2>优秀作品奖</h2>
          </article>
          <article class="placeholder-card glass-panel reveal-card delay-1">
            <span>+</span>
            <strong>新增证书位</strong>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> 晓染</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
