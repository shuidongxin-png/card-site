<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="晓染的个人主页入口。" />
    <title>晓染 - 入口</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="assets/site-bg-v3.jpg" as="image" />
    <link rel="preload" href="assets/avatar.jpg" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="entry-page">
    <main id="top" class="entry-shell">
      <section class="entry-stage" aria-label="登录入口">
        <div class="entry-art glass-panel reveal-card">
          <div class="entry-avatar">
            <img src="assets/avatar.jpg" alt="晓染头像" width="800" height="800" decoding="async" />
          </div>
          <p class="micro">XIAORAN / PERSONAL GATE</p>
          <h1>晓染</h1>
        </div>

        <div class="entry-form glass-panel reveal-card delay-1">
          <div class="entry-mark" aria-hidden="true">N</div>
          <h2>Welcome back</h2>
          <div class="tabs" role="tablist" aria-label="账号表单">
            <button class="tab active" type="button" role="tab" aria-selected="true" data-tab="login">登录</button>
            <button class="tab" type="button" role="tab" aria-selected="false" data-tab="register">注册</button>
          </div>

          <form id="loginForm" class="account-form">
            <label>
              邮箱或昵称
              <input name="loginName" autocomplete="username" placeholder="3265176894@qq.com" required />
            </label>
            <label>
              密码
              <input name="loginPassword" type="password" autocomplete="current-password" placeholder="输入密码" required minlength="6" />
            </label>
            <button class="button primary" type="submit">进入主页</button>
          </form>

          <form id="registerForm" class="account-form hidden">
            <label>
              昵称
              <input name="nickname" autocomplete="nickname" placeholder="晓染" required />
            </label>
            <label>
              邮箱
              <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
            </label>
            <label>
              密码
              <input name="password" type="password" autocomplete="new-password" placeholder="至少 6 位" required minlength="6" />
            </label>
            <button class="button primary" type="submit">创建并进入</button>
          </form>

          <button class="button secondary guest-button" type="button" data-guest-login>游客进入</button>
          <p id="accountStatus" class="status" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
