<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="晓染的个人名片主页，包含个人信息、联系方式和背景音乐。"
    />
    <title>晓染 - 个人名片</title>
    <link rel="preload" href="assets/site-bg.jpg" as="image" />
    <link rel="preload" href="assets/avatar.jpg" as="image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">晓染</a>
      <nav aria-label="主导航">
        <a href="index.html">首页</a>
        <a href="qq.html">QQ 主页</a>
        <a href="account.html">登录</a>
        <a href="messages.html">私信</a>
        <a href="skills.html">技能</a>
        <a href="awards.html">奖状</a>
      </nav>
    </header>

    <main id="top" class="home-main">
      <section class="hero" aria-label="个人主页首屏">
        <img
          class="hero-bg"
          src="assets/site-bg.jpg"
          alt=""
          width="1200"
          height="1670"
          fetchpriority="high"
          decoding="async"
        />
        <div class="hero-shade"></div>
        <div class="hero-inner">
          <div class="hero-copy">
            <p class="eyebrow">Scorpio / QQ 3265176894</p>
            <h1>晓染</h1>
            <p class="intro">欢迎来到我的线上名片。</p>
            <div class="actions">
              <a class="button primary" href="messages.html">给我留言</a>
              <a class="button secondary" href="skills.html">看看技能</a>
            </div>
          </div>

          <aside class="profile-card" aria-label="个人信息卡片">
            <div class="avatar-wrap">
              <img
                src="assets/avatar.jpg"
                alt="税冬鑫头像"
                width="800"
                height="800"
                fetchpriority="high"
                decoding="async"
              />
            </div>
            <div>
              <p class="card-kicker">个人信息</p>
              <h2>税冬鑫</h2>
              <p>昵称：晓染</p>
              <p>QQ：3265176894</p>
              <p>微信：sdx20039</p>
            </div>
            <ul class="quick-links">
              <li><a href="mailto:3265176894@qq.com">3265176894@qq.com</a></li>
              <li><button class="text-button" data-copy="3265176894">复制 QQ</button></li>
              <li><button class="text-button" data-copy="sdx20039">复制微信</button></li>
            </ul>
            <p id="copyStatus" class="status" role="status" aria-live="polite"></p>
          </aside>
        </div>
      </section>

      <section class="music-player" aria-label="背景音乐播放器">
        <div>
          <p class="eyebrow">Background Music</p>
          <h2>红色高跟鞋</h2>
          <p>页面会尝试自动播放。若浏览器拦截，点击页面任意位置或下面按钮即可播放。</p>
        </div>
        <div class="audio-box">
          <audio id="bgMusic" controls loop preload="none" playsinline>
            <source src="assets/bg-music.mp3" type="audio/mpeg" />
          </audio>
          <button id="musicToggle" class="button secondary" type="button">播放音乐</button>
          <p id="musicStatus" class="mini-status" role="status" aria-live="polite"></p>
        </div>
      </section>
    </main>

    <footer>
      <p>© <span id="year"></span> 晓染. All rights reserved.</p>
      <p class="beian">QQ：3265176894 / 微信：sdx20039</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
