<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="湖北文理学院理工学院简介。" />
    <title>晓染 - 学校</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="assets/school-campus-bg.jpg" as="image" />
    <link rel="stylesheet" href="styles.css?v=17" />
  </head>
  <body class="school-page">
    <header class="site-header">
      <a class="brand" href="#home" data-page="home.html"><span>晓染</span></a>
      <nav aria-label="主导航">
        <a href="#home" data-page="home.html">首页</a>
        <a href="#school" data-page="school.html">学校</a>
        <a href="#messages" data-page="messages.html">私信</a>
        <a href="#skills" data-page="skills.html">技能</a>
        <a href="#awards" data-page="awards.html">奖状</a>
        <a href="#fitness" data-page="fitness.html">我的健身之路</a>
        <a href="#logout" data-auth-action="logout">登出</a>
      </nav>
    </header>

    <main id="top" class="school-command-main">
      <section id="school" class="school-command">
        <div class="school-title reveal-card">
          <div>
            <h1>湖北文理学院理工学院</h1>
            <p class="school-motto-line">志存高远 自强笃行</p>
            <p class="terminal-chip">&gt; TIMELINE: 2003 - 至今 // NODE_ID: HBASTU</p>
          </div>
          <img class="school-logo-mark" src="assets/school-logo.png" alt="湖北文理学院理工学院校徽" width="520" height="440" decoding="async" />
        </div>

        <div class="school-command-grid">
          <article class="school-brief glass-panel reveal-card delay-1">
            <p class="micro">核心档案</p>
            <p class="school-copy">位于湖北省襄阳市襄城区尹集东街 28 号，经教育部批准，面向全国招生的全日制普通本科独立学院。学院由湖北文理学院与汉江国有资本投资集团共同举办，立足应用型、地方性办学定位，服务区域产业与社会发展。</p>
          </article>
        </div>

        <div class="school-gallery-row" aria-label="校园风光">
          <figure class="school-photo-card glass-panel reveal-card delay-2">
            <img src="assets/card-thumbs/school-view-1.jpg" alt="校园主楼" width="760" height="535" loading="eager" decoding="async" />
            <figcaption>主楼广场</figcaption>
          </figure>
          <figure class="school-photo-card glass-panel reveal-card delay-2">
            <img src="assets/card-thumbs/school-view-2.jpg" alt="校园路牌与教学楼" width="760" height="535" loading="lazy" decoding="async" />
            <figcaption>校园导引</figcaption>
          </figure>
          <figure class="school-photo-card glass-panel reveal-card delay-3">
            <img src="assets/card-thumbs/school-view-3.jpg" alt="校园荷塘" width="760" height="535" loading="lazy" decoding="async" />
            <figcaption>荷塘绿意</figcaption>
          </figure>
          <figure class="school-photo-card glass-panel reveal-card delay-3">
            <img src="assets/card-thumbs/school-view-4.jpg" alt="傍晚教学楼" width="760" height="535" loading="lazy" decoding="async" />
            <figcaption>暮色楼影</figcaption>
          </figure>
        </div>
      </section>
    </main>

    <script src="script.js" defer></script>
  </body>
</html>
